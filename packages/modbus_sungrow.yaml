# 'virtual' template sensors for better readability
template:
  - binary_sensor:
      - name: WR1 PV generating
        unique_id: wr1_pv_generating
        # TODO: test more with these parameters for template binary sensors
        # device_class: none / power
        # state_class: measurement
        availability: >-
          {{ 
          not is_state('sensor.wr1_running_state', 'unavailable') 
          and not is_state('sensor.wr1_total_dc_power', 'unavailable') 
          }}
        state: >-
          {% if states('sensor.wr1_running_state')|is_number %}
            {# use available sensor running_state #}
            {{ states('sensor.wr1_running_state')|int |bitwise_and(0x1) }}
          {% else %} 
            {# workaround for SH*RS inverters without working running_state #}
            {% if states('sensor.wr1_total_dc_power')|int > 0 %}
              1
            {% else %} 
              0 
            {% endif %}
          {% endif %}

      - name: WR1 PV generating (delay)
        unique_id: wr1_pv_generating_delay
        # TODO: test more with these parameters for template binary sensors
        # device_class: none / power
        # state_class: measurement
        availability: "{{ not is_state('binary_sensor.wr1_pv_generating', 'unavailable') }}"
        delay_on:
          seconds: 60
        state: "{{ states('binary_sensor.wr1_pv_generating') }}"

      - name: WR1 Battery charging
        unique_id: wr1_battery_charging
        # TODO: test more with these parameters for template binary sensors
        # device_class: none / power
        # state_class: measurement
        availability: >-
          {{ 
          not is_state('sensor.wr1_running_state', 'unavailable')
          or
            (   not is_state('sensor.wr1_ems_mode_selection_raw', 'unavailable')
            and not is_state('sensor.wr1_battery_forced_charge_discharge_cmd_raw', 'unavailable') 
            and not is_state('sensor.wr1_battery_power_raw', 'unavailable') 
            and not is_state('sensor.wr1_total_dc_power', 'unavailable')
            and not is_state('sensor.wr1_load_power', 'unavailable') 
            )
          }}
        state: >-
          {% if states('sensor.wr1_running_state')|is_number %}
            {# use available sensor running_state #}
            {% if states('sensor.wr1_running_state')|int(default=0)|bitwise_and(0x2) > 0 %}
              on
            {% else %}
              off
            {% endif %}
          {% else %}
            {# workaround for SH*RS inverters without working running_state #}
            {% if (states('sensor.wr1_ems_mode_selection') ) == "Forced mode" %}
              {# EMS forced mode #}
              {% if (states('sensor.wr1_battery_forced_charge_discharge_cmd') == "Forced charge") %}
                {# in mode Forced charge #}
                {% if (states('sensor.wr1_battery_power_raw')|int > 0 ) %}
                  {# power flow from/to battery #}
                  on
                {% else %} 
                  {# no power flow from/to battery #}
                  off
                {% endif %}
              {% else %}
                {# in EMS mode, but not in mode Forced charge #}
                off
              {% endif %}
            {% else %} 
              {# not in EMS forced mode, assuming self consumption mode #}
              {% if states('sensor.wr1_total_dc_power')|int > states('sensor.wr1_load_power')|int %}
                {# more power generated than consumed. assuming battery charging #}
                on
              {% else %} 
                off
              {% endif %}
            {% endif %}
          {% endif %}

      - name: WR1 Battery charging (delay)
        unique_id: wr1_battery_charging_delay
        # TODO: test more with these parameters for template binary sensors
        # device_class: none / power
        # state_class: measurement
        availability: "{{ not is_state('binary_sensor.wr1_battery_charging', 'unavailable') }}"
        delay_on:
          seconds: 60
        state: "{{ states('binary_sensor.wr1_battery_charging') }}"

      - name: WR1 Battery discharging
        unique_id: wr1_battery_discharging
        # TODO: test more with these parameters for template binary sensors
        # device_class: none / power
        # state_class: measurement
        availability: >-
          {{ 
          not is_state('sensor.wr1_running_state', 'unavailable')
          or
            (   not is_state('sensor.wr1_ems_mode_selection_raw', 'unavailable')
            and not is_state('sensor.wr1_battery_forced_charge_discharge_cmd_raw', 'unavailable')
            and not is_state('sensor.wr1_battery_power_raw', 'unavailable')
            and not is_state('sensor.wr1_total_dc_power', 'unavailable') 
            and not is_state('sensor.wr1_load_power', 'unavailable') 
            )
          }}
        state: >-
          {% if states('sensor.wr1_running_state')|is_number %}
            {# use available sensor running_state #}
            {% if states('sensor.wr1_running_state')|int(default=0)|bitwise_and(0x4) > 0 %}
              on
            {% else %}
              off
            {% endif %}
          {% else %}
            {# workaround for SH*RS inverters without working running_state #}
            {% if (states('sensor.wr1_ems_mode_selection') ) == "Forced mode" %}
              {# EMS forced mode #}
              {% if (states('sensor.wr1_battery_forced_charge_discharge_cmd') == "Forced discharge") %}
                {# in mode Forced discharge #}
                {% if (states('sensor.wr1_battery_power_raw')|int > 0 ) %}
                  {# power flow from/to battery #}
                  on
                {% else %} 
                  {# no power flow from/to battery #}
                  off
                {% endif %}
              {% else %} 
                {# in EMS mode, but not in mode Forced charge #}
                off
              {% endif %}
            {% else %} 
              {# not in EMS forced mode, assuming self consumption mode #}
              {% if ( ( states('sensor.wr1_total_dc_power')|int < states('sensor.wr1_load_power')|int ) ) and states('sensor.wr1_battery_power_raw')|int > 0 %}
                {# more power consumed than generated and some battery power --> assuming battery discharging #}
                on
              {% else %} 
                off
              {% endif %}
            {% endif %}
          {% endif %}

      - name: WR1 Battery discharging (delay)
        unique_id: wr1_battery_discharging_delay
        # TODO: test more with these parameters for template binary sensors
        # device_class: none / power
        # state_class: measurement
        availability: "{{ not is_state('binary_sensor.wr1_battery_discharging', 'unavailable') }}"
        delay_on:
          seconds: 60
        state: "{{ states('binary_sensor.wr1_battery_discharging') }}"

      - name: WR1 Exporting power
        unique_id: wr1_exporting_power
        # TODO: test more with these parameters for template binary sensors
        # device_class: none / power
        # state_class: measurement
        availability: >-
          {{ 
          not is_state('sensor.wr1_running_state', 'unavailable') 
          and not is_state('sensor.wr1_signed_export_power', 'unavailable') 
          }}
        state: >-
          {% if states('sensor.wr1_running_state')|is_number %}
            {# use available sensor running_state #}
            {{ states('sensor.wr1_running_state')|int(default=0)|bitwise_and(0x10) > 0 }}
          {% else %} 
            {# workaround for SH*RS inverters without working running_state #}
            {% if states('sensor.wr1_signed_export_power')|int(0) > 0 %}
              1
            {% else %} 
              0 
            {% endif %}
          {% endif %}

      - name: WR1 Exporting power (delay)
        unique_id: wr1_exporting_power_delay
        # TODO: test more with these parameters for template binary sensors
        # device_class: none / power
        # state_class: measurement
        availability: "{{ not is_state('binary_sensor.wr1_exporting_power', 'unavailable') }}"
        delay_on:
          seconds: 60
        state: "{{ states('binary_sensor.wr1_exporting_power') }}"

      - name: WR1 Importing power
        unique_id: wr1_importing_power
        # TODO: test more with these parameters for template binary sensors
        # device_class: none / power
        # state_class: measurement
        availability: >-
          {{ 
          not is_state('sensor.wr1_running_state', 'unavailable') 
          and not is_state('sensor.wr1_running_state', 'unavailable')
          }}
        state: >-
          {% if states('sensor.wr1_running_state')|is_number %}
            {# use available sensor running_state #}
            {{ states('sensor.wr1_running_state')|int(default=0)|bitwise_and(0x20) > 0 }}
          {% else %} 
            {# workaround for SH*RS inverters without working running_state #}
            {% if states('sensor.wr1_signed_export_power')|int < 0 %}
              1
            {% else %}
              0
            {% endif %}
          {% endif %}

      - name: WR1 Importing power (delay)
        unique_id: wr1_importing_power_delay
        # TODO: test more with these parameters for template binary sensors
        # device_class: none / power
        # state_class: measurement
        availability: "{{ not is_state('binary_sensor.wr1_importing_power', 'unavailable') }}"
        delay_on:
          seconds: 60
        state: "{{ states('binary_sensor.wr1_importing_power') }}"

  - sensor:
      - name: WR1 MPPT1 power
        unique_id: wr1_mppt1_power
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        availability: >-
          {{ 
          not is_state('sensor.wr1_mppt1_voltage', 'unavailable') 
          and not is_state('sensor.wr1_mppt1_current', 'unavailable') 
          }}
        state: "{{ (states('sensor.wr1_mppt1_voltage') | float * states('sensor.wr1_mppt1_current') | float) |int }}"

      - name: WR1 MPPT2 power
        unique_id: wr1_mppt2_power
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        availability: >-
          {{ 
          not is_state('sensor.wr1_mppt2_voltage', 'unavailable') 
          and not is_state('sensor.wr1_mppt2_current', 'unavailable' ) 
          }}
        state: "{{ (states('sensor.wr1_mppt2_voltage') | float * states('sensor.wr1_mppt2_current') | float) |int }}"

      - name: WR1 Phase A power
        unique_id: wr1_phase_a_power
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        availability: >-
          {{ 
          not is_state('sensor.wr1_phase_a_voltage', 'unavailable')
          and not is_state('sensor.wr1_phase_a_current', 'unavailable')
          }}
        state: "{{ (states('sensor.wr1_phase_a_voltage') | float * states('sensor.wr1_phase_a_current') | float) |int }}"

      - name: WR1 Phase B power
        unique_id: wr1_phase_b_power
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        availability: >-
          {{ 
          not is_state('sensor.wr1_phase_b_voltage', 'unavailable') 
          and not is_state('sensor.wr1_phase_b_current', 'unavailable') 
          }}
        state: "{{ (states('sensor.wr1_phase_b_voltage') | float * states('sensor.wr1_phase_b_current') | float) |int }}"

      - name: WR1 Phase C power
        unique_id: wr1_phase_c_power
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        availability: >-
          {{ 
          not is_state('sensor.wr1_phase_c_voltage', 'unavailable')
          and not is_state('sensor.wr1_phase_c_current', 'unavailable')
          }}
        state: "{{ (states('sensor.wr1_phase_c_voltage') | float * states('sensor.wr1_phase_c_current') | float) |int }}"

      - name: WR1 Meter active power
        unique_id: wr1_meter_active_power
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        availability: >-
          {{ 
          not is_state('sensor.wr1_meter_active_power_raw', 'unavailable')
          and states('sensor.wr1_meter_active_power_raw')|int != 0x7FFFFFFF
          }}
        state: "{{ states('sensor.wr1_meter_active_power_raw') }}"

      - name: WR1 Meter Phase A active power
        unique_id: wr1_meter_phase_a_active_power
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        availability: >-
          {{ 
          not is_state('sensor.wr1_meter_phase_a_active_power_raw', 'unavailable')
          and states('sensor.wr1_meter_phase_a_active_power_raw')|int != 0x7FFFFFFF
          }}
        state: "{{ states('sensor.wr1_meter_phase_a_active_power_raw') }}"

      - name: WR1 Meter Phase B active power
        unique_id: wr1_meter_phase_b_active_power
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        availability: >-
          {{ 
          not is_state('sensor.wr1_meter_phase_b_active_power_raw', 'unavailable') 
          and states('sensor.wr1_meter_phase_b_active_power_raw')|int != 0x7FFFFFFF 
          }}
        state: "{{ states('sensor.wr1_meter_phase_b_active_power_raw') }}"

      - name: WR1 Meter Phase C active power
        unique_id: wr1_meter_phase_c_active_power
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        availability: >-
          {{ 
          not is_state('sensor.wr1_meter_phase_c_active_power_raw', 'unavailable')
          and states('sensor.wr1_meter_phase_c_active_power_raw')|int != 0x7FFFFFFF
          }}
        state: "{{ states('sensor.wr1_meter_phase_c_active_power_raw') }}"

      - name: WR1 inverter state
        unique_id: wr1_inverter_state
        # TODO: test state_class with enum
        # state_class: measurement
        device_class: enum
        availability: "{{ not is_state('sensor.wr1_system_state', 'unavailable') }}"
        state: >-
          {% if ((states('sensor.wr1_system_state') | int(default=0)) == 0x0002) %}
            Stop
          {% elif ((states('sensor.wr1_system_state') | int(default=0)) == 0x0008) %}
            Standby
          {% elif ((states('sensor.wr1_system_state') | int(default=0)) == 0x0010) %}
            Initial Standby
          {% elif ((states('sensor.wr1_system_state') | int(default=0)) == 0x0020) %}
            Startup
          {% elif ((states('sensor.wr1_system_state') | int(default=0)) in [0x0000,0x0040]) %}
            Running
          {% elif ((states('sensor.wr1_system_state') | int(default=0)) == 0x0100) %}
            Fault
          {% elif ((states('sensor.wr1_system_state') | int(default=0)) == 0x0400) %}
            Maintain mode
          {% elif ((states('sensor.wr1_system_state') | int(default=0)) == 0x0800) %}
            Forced mode
          {% elif ((states('sensor.wr1_system_state') | int(default=0)) == 0x1000) %}
            Off-grid mode
          {% elif ((states('sensor.wr1_system_state') | int(default=0)) == 0x2501) %}
            Restarting
          {% elif ((states('sensor.wr1_system_state') | int(default=0)) == 0x4000) %}
            External EMS mode
          {% else %}
            Unknown - should not see me!
          {% endif %}

      - name: WR1 device type
        unique_id: wr1_device_type
        availability: "{{ not is_state('sensor.wr1_sungrow_device_type_code', 'unavailable') }}"
        # TODO: test state_class with enum
        # state_class: measurement
        device_class: enum
        state: >-
          {% if ((states('sensor.wr1_sungrow_device_type_code') | int(default=0))  == 0x0D06) %}
            SH3K6
          {% elif ((states('sensor.wr1_sungrow_device_type_code') | int(default=0)) == 0x0D07) %}
            SH4K6
          {% elif ((states('sensor.wr1_sungrow_device_type_code') | int(default=0)) == 0x0D09) %}
            SH5K-20  
          {% elif ((states('sensor.wr1_sungrow_device_type_code') | int(default=0)) == 0x0D03) %}
            SH5K-V13
          {% elif ((states('sensor.wr1_sungrow_device_type_code') | int(default=0)) == 0x0D0A) %}
            SH3K6-30
          {% elif ((states('sensor.wr1_sungrow_device_type_code') | int(default=0)) == 0x0D0B) %}
            SH4K6-30
          {% elif ((states('sensor.wr1_sungrow_device_type_code') | int(default=0)) == 0x0D0C) %}
            SH5K-30
          {% elif ((states('sensor.wr1_sungrow_device_type_code') | int(default=0)) == 0x0D17) %}
            SH3.RS
          {% elif ((states('sensor.wr1_sungrow_device_type_code') | int(default=0)) == 0x0D0D) %}
            SH3.6RS
          {% elif ((states('sensor.wr1_sungrow_device_type_code') | int(default=0)) == 0x0D18) %}
            SH4.0RS
          {% elif ((states('sensor.wr1_sungrow_device_type_code') | int(default=0)) == 0x0D0F) %}
            SH5.0RS
          {% elif ((states('sensor.wr1_sungrow_device_type_code') | int(default=0)) == 0x0D10) %}
            SH6.0RS
          {% elif ((states('sensor.wr1_sungrow_device_type_code') | int(default=0)) == 0x0D1A) %}
            SH8.0RS
          {% elif ((states('sensor.wr1_sungrow_device_type_code') | int(default=0)) == 0x0D1B) %}
            SH10RS
          {% elif ((states('sensor.wr1_sungrow_device_type_code') | int(default=0)) == 0x0E00) %}
            SH5.0RT
          {% elif ((states('sensor.wr1_sungrow_device_type_code') | int(default=0)) == 0x0E01) %}
            SH6.0RT
          {% elif ((states('sensor.wr1_sungrow_device_type_code') | int(default=0)) == 0x0E02) %}
            SH8.0RT
          {% elif ((states('sensor.wr1_sungrow_device_type_code') | int(default=0)) == 0x0E03) %}
            SH10RT
          {% elif ((states('sensor.wr1_sungrow_device_type_code') | int(default=0)) == 0x0E10) %}
            SH5.0RT-20
          {% elif ((states('sensor.wr1_sungrow_device_type_code') | int(default=0)) == 0x0E11) %}
            SH6.0RT-20
          {% elif ((states('sensor.wr1_sungrow_device_type_code') | int(default=0)) == 0x0E12) %}
            SH8.0RT-20
          {% elif ((states('sensor.wr1_sungrow_device_type_code') | int(default=0)) == 0x0E13) %}
            SH10RT-20
          {% elif ((states('sensor.wr1_sungrow_device_type_code') | int(default=0)) == 0x0E0C) %}
            SH5.0RT-V112
          {% elif ((states('sensor.wr1_sungrow_device_type_code') | int(default=0)) == 0x0E0D) %}
            SH6.0RT-V112
          {% elif ((states('sensor.wr1_sungrow_device_type_code') | int(default=0)) == 0x0E0E) %}
            SH8.0RT-V112
          {% elif ((states('sensor.wr1_sungrow_device_type_code') | int(default=0)) == 0x0E0F) %}
            SH10RT-V112
          {% elif ((states('sensor.wr1_sungrow_device_type_code') | int(default=0)) == 0x0E08) %}
            SH5.0RT-V122
          {% elif ((states('sensor.wr1_sungrow_device_type_code') | int(default=0)) == 0x0E09) %}
            SH6.0RT-V122
          {% elif ((states('sensor.wr1_sungrow_device_type_code') | int(default=0)) == 0x0E0A) %}
            SH8.0RT-V122
          {% elif ((states('sensor.wr1_sungrow_device_type_code') | int(default=0)) == 0x0E0B) %}
            SH10RT-V122
          {% elif ((states('sensor.wr1_sungrow_device_type_code') | int(default=0)) == 0x0D0E) %}
            SH4.6RS 
          {% else %}
            Unknown device code!
          {% endif %}

      # make the sensor battery_forced_charge_discharge_cmd more human readable
      # Inverter States from modbus reference manual
      # 0xAA forced charge
      # 0xBB forced discharge
      # 0xCC Stop (default)
      - name: WR1 Battery forced charge discharge cmd
        unique_id: wr1_battery_forced_charge_discharge_cmd
        availability: "{{ not is_state('sensor.wr1_battery_forced_charge_discharge_cmd_raw', 'unavailable') }}"
        # TODO: test state_class with enum
        # state_class: measurement
        device_class: enum
        state: >-
          {% if ((states('sensor.wr1_battery_forced_charge_discharge_cmd_raw') | int(default=0)) == 0x00AA) %}
            Forced charge
          {% elif ((states('sensor.wr1_battery_forced_charge_discharge_cmd_raw') | int(default=0))  == 0x00BB) %}
            Forced discharge
          {% elif ((states('sensor.wr1_battery_forced_charge_discharge_cmd_raw') | int(default=0))  == 0x00CC) %}
            Stop (default)
          {% else %}
            Unknown - should not see me!
          {% endif %}

      # make the sensor ems_selection_raw more human readable
      - name: WR1 EMS mode selection
        unique_id: wr1_ems_mode_selection
        availability: "{{ not is_state('sensor.wr1_ems_mode_selection_raw', 'unavailable') }}"
        # TODO: test state_class with enum with enum
        # state_class: measurement
        device_class: enum
        state: >-
          {% if ((states('sensor.wr1_ems_mode_selection_raw') | int(default=0)) == 0) %}
            Self-consumption mode (default)
          {% elif ((states('sensor.wr1_ems_mode_selection_raw') | int(default=0)) == 2) %}
            Forced mode
          {% elif ((states('sensor.wr1_ems_mode_selection_raw') | int(default=0)) == 3) %}
            External EMS
          {% elif ((states('sensor.wr1_ems_mode_selection_raw') | int(default=0)) == 4) %}
            VPP
          {% elif ((states('sensor.wr1_ems_mode_selection_raw') | int(default=0)) == 8) %}
            MicroGrid
          {% else %}
            Unknown - should not see me!
          {% endif %}

      - name: WR1 Signed battery power # positive if charging and negative if discharging
        unique_id: wr1_signed_battery_power
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        availability: >-
          {{ 
          not is_state('binary_sensor.wr1_battery_charging', 'unavailable') 
          and not is_state('binary_sensor.wr1_battery_discharging', 'unavailable')
          and not is_state('sensor.wr1_battery_power_raw', 'unavailable')
          }}
        state: >-
          {% if is_state('binary_sensor.wr1_battery_charging', 'on') %}
            {{ (states('sensor.wr1_battery_power_raw') | float)}} 
          {% elif is_state('binary_sensor.wr1_battery_discharging', 'on') %} 
            {{ (states('sensor.wr1_battery_power_raw') | float * -1)}} 
          {% else %} 
            0 
          {% endif %}

      - name: WR1 Battery charging power # positive if charging else zero
        unique_id: wr1_battery_charging_power
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        availability: >-
          {{ 
          not is_state('binary_sensor.wr1_battery_charging', 'unavailable') 
          and not is_state('sensor.wr1_battery_power_raw', 'unavailable')
          }}
        state: >-
          {% if is_state('binary_sensor.wr1_battery_charging', 'on') %}
            {{ states('sensor.wr1_battery_power_raw') }}
          {% else %}
            0
          {% endif %}

      - name: WR1 Battery discharging power # positive if discharging else zero
        unique_id: wr1_battery_discharging_power
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        availability: >-
          {{ 
          not is_state('binary_sensor.wr1_battery_discharging', 'unavailable') 
          and not is_state('sensor.wr1_battery_power_raw', 'unavailable') 
          }}
        state: >-
          {% if is_state('binary_sensor.wr1_battery_discharging', 'on') %}
            {{ states('sensor.wr1_battery_power_raw') }}
          {% else %}
            0
          {% endif %}

      - name: WR1 Import power # power from grid: positive if importing, else zero
        unique_id: wr1_import_power
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: >-
          {% if states('sensor.wr1_signed_export_power')|int(0) < 0 %}
            {{ states('sensor.wr1_signed_export_power')|int *-1 }}
          {% else %}
            0
          {% endif %}

      - name: WR1 Export power # power to grid: positive if exporting, else zero
        unique_id: wr1_export_power
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        availability: "{{states('sensor.wr1_signed_export_power')|is_number }}"
        state: >-
          {% if states('sensor.wr1_signed_export_power')|int(0) > 0 %}
            {{ states('sensor.wr1_signed_export_power') }}
          {% else %}
            0
          {% endif %}

      - name: "WR1 Battery level (nominal)"
        unique_id: wr1_battery_level_nom
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
        availability: >-
          {{ 
          not is_state('sensor.wr1_battery_level', 'unavailable') 
          and not is_state('sensor.wr1_min_soc', 'unavailable') 
          and not is_state('sensor.wr1_max_soc', 'unavailable') 
          }}
        state: >-
          {% set soc_min = states('sensor.wr1_min_soc') | float %}
          {% set soc_max = states('sensor.wr1_max_soc') | float %}
          {% set soc_cur = states('sensor.wr1_battery_level') | float %}
          {{
            ((soc_min) + ((soc_max - soc_min) * (soc_cur / 100))) | round(1)
          }}

      - name: "WR1 Battery Capacity"
        unique_id: wr1_battery_capacity
        unit_of_measurement: kWh
        device_class: energy_storage
        state_class: measurement
        state: "12.8"

      # - name: "WR1 Battery charge (nominal)"
      #   unique_id: wr1_battery_charge_nom
      #   unit_of_measurement: kWh
      #   device_class: energy_storage
      #   state_class: measurement
      #   availability: >-
      #     {{
      #     not is_state('sensor.wr1_battery_capacity', 'unavailable')
      #     and not is_state('sensor.wr1_battery_level_nominal', 'unavailable')
      #     }}
      #   state: >-
      #     {{
      #       ( states('sensor.wr1_battery_capacity') | float *
      #       states('sensor.wr1_battery_level_nominal') | float / 100 )| round(1)
      #     }}

      - name: "WR1 Battery charge"
        unique_id: wr1_battery_charge
        unit_of_measurement: kWh
        device_class: energy_storage
        state_class: measurement
        availability: >-
          {{ 
          not is_state('sensor.wr1_battery_capacity', 'unavailable') 
          and not is_state('sensor.wr1_battery_level', 'unavailable') 
          and not is_state('sensor.wr1_min_soc', 'unavailable') 
          and not is_state('sensor.wr1_max_soc', 'unavailable') 
          }}
        state: >-
          {{ 
            ( states('sensor.wr1_battery_capacity')|float 
            * ( states('sensor.wr1_max_soc')|float - states('sensor.wr1_min_soc')|float ) /100 
            * states('sensor.wr1_battery_level')|float /100 
            ) |round(2)
          }}

      - name: WR1 Daily consumed energy
        unique_id: uid_daily_consumed_energy
        unit_of_measurement: kWh
        device_class: energy
        state_class: total_increasing
        availability: >-
          {{ 
          not is_state('sensor.wr1_daily_pv_generation', 'unavailable') 
          and not is_state('sensor.wr1_daily_exported_energy', 'unavailable') 
          and not is_state('sensor.wr1_daily_imported_energy', 'unavailable') 
          and not is_state('sensor.wr1_daily_battery_charge', 'unavailable') 
          and not is_state('sensor.wr1_daily_battery_discharge', 'unavailable') 
          }}
        state: >-
          {{ 
            (
              states('sensor.wr1_daily_pv_generation')|float 
              - states('sensor.wr1_daily_exported_energy')|float 
              + states('sensor.wr1_daily_imported_energy')|float 
              - states('sensor.wr1_daily_battery_charge')|float 
              + states('sensor.wr1_daily_battery_discharge')|float
            )|int 
          }}

      - name: WR1 Total consumed energy
        unique_id: uid_total_consumed_energy
        unit_of_measurement: kWh
        device_class: energy
        state_class: total
        availability: >-
          {{ 
          not is_state('sensor.wr1_total_pv_generation', 'unavailable') 
          and not is_state('sensor.wr1_total_exported_energy', 'unavailable') 
          and not is_state('sensor.wr1_total_imported_energy', 'unavailable') 
          and not is_state('sensor.wr1_total_battery_charge', 'unavailable') 
          and not is_state('sensor.wr1_total_battery_discharge', 'unavailable') 
          }}
        state: >-
          {{ 
            (
              states('sensor.wr1_total_pv_generation')|float 
              - states('sensor.wr1_total_exported_energy')|float 
              + states('sensor.wr1_total_imported_energy')|float 
              - states('sensor.wr1_total_battery_charge')|float 
              + states('sensor.wr1_total_battery_discharge')|float
            )|int 
          }}

# getting input for Min and Max SoC
input_number:
  set_wr1_min_soc:
    name: Set min SoC
    min: 0
    max: 50
    step: 1

  set_wr1_max_soc:
    name: Set max SoC
    min: 50
    max: 100
    step: 1

  set_wr1_reserved_soc_for_backup:
    name: Set reserved SoC for backup
    min: 0
    max: 75
    step: 1

  set_wr1_forced_charge_discharge_power:
    name: Set forced charge discharge power in W
    min: 0
    max: 5000
    step: 100

  set_wr1_battery_max_charge_power:
    name: Set max battery charge power in W
    min: 100
    max: 5000
    step: 100

  set_wr1_battery_max_discharge_power:
    name: Set max battery discharge power in W
    #initial: 40
    min: 100
    max: 5000
    step: 100

  set_wr1_battery_charging_start_power:
    name: Set battery charging start power in W
    min: 0
    max: 1000
    step: 10

  set_wr1_battery_discharging_start_power:
    name: Set battery discharging start power in W
    min: 0
    max: 1000
    step: 10

input_select:
  set_wr1_start_stop_mode:
    name: Inverter mode
    options:
      - "Start"
      - "Stop"

  # get input for battery mode (forced charge/discharge, stop (default) )
  set_wr1_ems_mode:
    name: EMS mode
    options:
      - "Self-consumption mode (default)"
      - "Forced mode"
    # these are commented, because they are rarely used
    #      - "External EMS"
    #      - "VPP"
    #      - "MicroGrid"
    icon: mdi:battery-unknown

  set_wr1_battery_forced_charge_discharge_cmd:
    name: Battery forced charge discharge cmd
    options:
      - "Stop (default)"
      - "Forced charge"
      - "Forced discharge"
    icon: mdi:battery-unknown

