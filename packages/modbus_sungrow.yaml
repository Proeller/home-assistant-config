# Home Assistant Sungrow inverter integration
# https://github.com/mkaiser/Sungrow-SHx-Inverter-Modbus-Home-Assistant
# by Martin Kaiser
# last update: 2023-03-24

modbus:
  - name: SungrowSH10RT
    type: tcp
    host: !secret sungrow_modbus_host_ip1
    port: !secret sungrow_modbus_port
    delay: 5
    timeout: 5
    close_comm_on_error: true

    sensors:
      - name: WR1 Sungrow device type code
        unique_id: wr1_dev_code
        slave: !secret sungrow_modbus_slave
        address: 4999 # reg 5000
        input_type: input
        data_type: uint16
        scan_interval: 600

      - name: WR1 Daily PV generation & battery discharge
        unique_id: wr1_daily_pv_gen_battery_discharge
        slave: !secret sungrow_modbus_slave
        address: 5002 # reg 5003
        input_type: input
        data_type: uint16
        precision: 1
        unit_of_measurement: kWh
        device_class: energy
        state_class: total_increasing
        scale: 0.1
        scan_interval: 600

      - name: WR1 Total PV generation & battery discharge
        unique_id: wr1_total_pv_gen_battery_discharge
        slave: !secret sungrow_modbus_slave
        address: 5003 # reg 5004
        input_type: input
        data_type: uint32
        swap: word
        unit_of_measurement: kWh
        precision: 1
        device_class: energy
        state_class: total
        scale: 0.1
        scan_interval: 600

      - name: WR1 Inverter temperature
        unique_id: wr1_inverter_temperature
        slave: !secret sungrow_modbus_slave
        address: 5007 # reg 5008
        input_type: input
        data_type: int16
        precision: 1
        unit_of_measurement: °C
        device_class: temperature
        state_class: measurement
        scale: 0.1
        scan_interval: 10

      - name: WR1 MPPT1 voltage
        unique_id: wr1_mppt1_voltage
        slave: !secret sungrow_modbus_slave
        address: 5010 # reg 5011
        input_type: input
        data_type: uint16
        precision: 1
        unit_of_measurement: V
        device_class: voltage
        scale: 0.1
        scan_interval: 10

      - name: WR1 MPPT1 current
        unique_id: wr1_mppt1_current
        slave: !secret sungrow_modbus_slave
        address: 5011 # reg 5012
        input_type: input
        data_type: uint16
        precision: 2
        unit_of_measurement: A
        device_class: current
        state_class: measurement
        scale: 0.1
        scan_interval: 10

      - name: WR1 MPPT2 voltage
        unique_id: wr1_mppt2_voltage
        slave: !secret sungrow_modbus_slave
        address: 5012 # reg 5013
        input_type: input
        data_type: uint16
        precision: 1
        unit_of_measurement: V
        device_class: voltage
        state_class: measurement
        scale: 0.1
        scan_interval: 10

      - name: WR1 MPPT2 current
        unique_id: wr1_mppt2_current
        slave: !secret sungrow_modbus_slave
        address: 5013 # reg 5014
        input_type: input
        data_type: uint16
        precision: 2
        unit_of_measurement: A
        device_class: current
        state_class: measurement
        scale: 0.1
        scan_interval: 10

      - name: WR1 Total DC power
        unique_id: wr1_total_dc_power
        slave: !secret sungrow_modbus_slave
        address: 5016 # reg 5017
        input_type: input
        data_type: uint32
        swap: word
        precision: 0
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        scale: 1
        scan_interval: 10

      - name: WR1 Phase A voltage
        unique_id: wr1_phase_a_voltage
        slave: !secret sungrow_modbus_slave
        address: 5018 # reg: 5019
        input_type: input
        data_type: uint16
        precision: 1
        unit_of_measurement: V
        device_class: voltage
        state_class: measurement
        scale: 0.1
        scan_interval: 10

      - name: WR1 Phase B voltage
        unique_id: wr1_phase_b_voltage
        slave: !secret sungrow_modbus_slave
        address: 5019 # reg: 5020
        input_type: input
        data_type: uint16
        precision: 1
        unit_of_measurement: V
        device_class: voltage
        state_class: measurement
        scale: 0.1
        scan_interval: 10

      - name: WR1 Phase C voltage
        unique_id: wr1_phase_c_voltage
        slave: !secret sungrow_modbus_slave
        address: 5020 # reg: 5021
        input_type: input
        data_type: uint16
        precision: 1
        unit_of_measurement: V
        device_class: voltage
        state_class: measurement
        scale: 0.1
        scan_interval: 10

      - name: WR1 Reactive power
        unique_id: wr1_reactive_power
        device_address: !secret sungrow_modbus_slave
        address: 5032 # reg 5033
        input_type: input
        data_type: int32
        swap: word
        precision: 0
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        scale: 1
        scan_interval: 10

      - name: WR1 Power factor
        unique_id: wr1_power_factor
        device_address: !secret sungrow_modbus_slave
        address: 5034 # reg 5035
        input_type: input
        data_type: int16
        precision: 3
        device_class: power_factor
        state_class: measurement
        scale: 0.001
        scan_interval: 10

      - name: WR1 Grid Frequency
        unique_id: wr1_grid_frequency
        slave: !secret sungrow_modbus_slave
        address: 5035
        input_type: input
        data_type: uint16
        precision: 2
        unit_of_measurement: "Hz"
        device_class: frequency
        state_class: measurement
        scale: 0.1
        scan_interval: 10

      - name: WR1 Meter active power raw
        unique_id: wr1_meter_active_power_raw
        device_address: !secret sungrow_modbus_slave
        address: 5600 # reg 5601
        input_type: input
        data_type: int32
        swap: word
        precision: 0
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        scale: 1
        scan_interval: 10

      - name: WR1 Meter phase A active power raw
        unique_id: wr1_meter_phase_a_active_power_raw
        device_address: !secret sungrow_modbus_slave
        address: 5602 # reg 5603
        input_type: input
        data_type: int32
        swap: word
        precision: 0
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        scale: 1
        scan_interval: 10

      - name: WR1 Meter phase B active power raw
        unique_id: wr1_meter_phase_b_active_power_raw
        device_address: !secret sungrow_modbus_slave
        address: 5604 # reg 5605
        input_type: input
        data_type: int32
        swap: word
        precision: 0
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        scale: 1
        scan_interval: 10

      - name: WR1 Meter phase C active power raw
        unique_id: wr1_meter_phase_c_active_power_raw
        device_address: !secret sungrow_modbus_slave
        address: 5606 # reg 5607
        input_type: input
        data_type: int32
        swap: word
        precision: 0
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        scale: 1
        scan_interval: 10

      - name: WR1 BDC rated power
        unique_id: wr1_bdc_rated_power
        device_address: !secret sungrow_modbus_slave
        address: 5627 # reg 5628
        input_type: input
        data_type: uint16
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        scale: 100
        scan_interval: 600

      - name: WR1 BMS max. charging current
        unique_id: wr1_bms_max_charging_current
        device_address: !secret sungrow_modbus_slave
        address: 5634 # reg 5635
        input_type: input
        data_type: uint16
        precision: 0
        unit_of_measurement: A
        device_class: current
        state_class: measurement
        scale: 1
        scan_interval: 60

      - name: WR1 BMS max. discharging current
        unique_id: wr1_bms_max_discharging_current
        device_address: !secret sungrow_modbus_slave
        address: 5635 # reg 5636
        input_type: input
        data_type: uint16
        precision: 0
        unit_of_measurement: A
        device_class: current
        state_class: measurement
        scale: 1
        scan_interval: 60

      #https://www.photovoltaikforum.com/thread/166134-daten-lesen-vom-sungrow-wechselrichtern-modbus/?pageNo=13
      #Phase A Backup Power: 5723 S16 W (Backup Leistung Phase A)
      #Phase B Backup Power: 5724 S16 W (Backup Leistung Phase B)
      #Phase C Backup Power: 5725 S16 W (Backup Leistung Phase C)
      - name: WR1 Total backup power
        device_address: !secret sungrow_modbus_slave
        unique_id: wr1_total_backup_power
        address: 5725 # reg 5726
        input_type: input
        data_type: int16
        precision: 0
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        scale: 1
        scan_interval: 10

      - name: WR1 Backup phase A power
        unique_id: wr1_backup_phase_a_power
        device_address: !secret sungrow_modbus_slave
        address: 5722 # reg 5723
        input_type: input
        data_type: int16
        precision: 0
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        scale: 1
        scan_interval: 10

      - name: WR1 Backup phase B power
        unique_id: wr1_backup_phase_b_power
        device_address: !secret sungrow_modbus_slave
        address: 5723 # reg 5724
        input_type: input
        data_type: int16
        precision: 0
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        scale: 1
        scan_interval: 10

      - name: WR1 Backup phase C power
        unique_id: wr1_backup_phase_c_power
        device_address: !secret sungrow_modbus_slave
        address: 5724 # reg 5725
        input_type: input
        data_type: int16
        precision: 0
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        scale: 1
        scan_interval: 10

      - name: WR1 System state
        unique_id: wr1_system_state
        slave: !secret sungrow_modbus_slave
        address: 12999 # reg 13000
        input_type: input
        data_type: uint16
        precision: 0
        scale: 1
        state_class: measurement
        scan_interval: 10

      # register running state is not available for certain SH*RS inverters
      # template sensors are used to determine the states based on other sensors
      - name: WR1 Running state
        unique_id: wr1_running_state
        slave: !secret sungrow_modbus_slave
        address: 13000 # reg 13001
        input_type: input
        data_type: uint16
        state_class: measurement
        precision: 0
        scale: 1
        scan_interval: 10

      - name: WR1 Daily PV generation
        unique_id: wr1_daily_pv_generation
        slave: !secret sungrow_modbus_slave
        address: 13001 # reg 13002
        input_type: input
        data_type: uint16
        precision: 1
        unit_of_measurement: kWh
        device_class: energy
        state_class: total_increasing
        scale: 0.1
        scan_interval: 600

      - name: WR1 Total PV generation
        unique_id: wr1_total_pv_generation
        slave: !secret sungrow_modbus_slave
        address: 13002 # reg 13003
        input_type: input
        data_type: uint32
        swap: word
        precision: 1
        unit_of_measurement: kWh
        device_class: energy
        state_class: total
        scale: 0.1
        scan_interval: 600

      - name: WR1 Daily exported energy from PV
        unique_id: wr1_daily_exported_energy_from_PV
        slave: !secret sungrow_modbus_slave
        address: 13004 # reg 13005
        input_type: input
        data_type: uint16
        precision: 1
        unit_of_measurement: kWh
        device_class: energy
        state_class: total_increasing
        scale: 0.1
        scan_interval: 600

      - name: WR1 Total exported energy from PV
        unique_id: wr1_total_exported_energy_from_pv
        slave: !secret sungrow_modbus_slave
        address: 13005 # reg 13006
        input_type: input
        data_type: uint32
        swap: word
        precision: 1
        unit_of_measurement: kWh
        device_class: energy
        state_class: total
        scale: 0.1
        scan_interval: 60

      # this value returns the power which flows from the battery to the house
      - name: WR1 Load power
        unique_id: wr1_load_power
        slave: !secret sungrow_modbus_slave
        address: 13007 # reg 13008
        input_type: input
        data_type: int32
        swap: word
        precision: 0
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        scale: 1
        scan_interval: 10

      # this value returns a positive value when exporting and a negative value when importing power
      - name: WR1 Signed Export Power
        unique_id: wr1_signed_export_power
        slave: !secret sungrow_modbus_slave
        address: 13009 # reg 13010
        input_type: input
        data_type: int32
        swap: word
        precision: 0
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        scale: 1
        scan_interval: 10

      - name: WR1 Daily battery charge from PV
        unique_id: wr1_daily_battery_charge_from_pv
        slave: !secret sungrow_modbus_slave
        address: 13011 # reg 13012
        input_type: input
        data_type: uint16
        precision: 1
        unit_of_measurement: kWh
        device_class: energy
        state_class: total_increasing
        scale: 0.1
        scan_interval: 60

      - name: WR1 Total battery charge from PV
        unique_id: wr1_total_battery_charge_from_pv
        slave: !secret sungrow_modbus_slave
        address: 13012 # reg 13013
        input_type: input
        data_type: uint32
        swap: word
        precision: 1
        unit_of_measurement: kWh
        device_class: energy
        state_class: total
        scale: 0.1
        scan_interval: 60

      - name: WR1 Daily direct energy consumption
        unique_id: wr1_daily_direct_energy_consumption
        slave: !secret sungrow_modbus_slave
        address: 13016 # reg 13017
        input_type: input
        data_type: uint16
        precision: 1
        unit_of_measurement: kWh
        device_class: energy
        state_class: total_increasing
        scale: 0.1
        scan_interval: 60

      - name: WR1 Total direct energy consumption
        unique_id: wr1_total_direct_energy_consumption
        slave: !secret sungrow_modbus_slave
        address: 13017 # reg 13018
        input_type: input
        data_type: uint32
        swap: word
        precision: 1
        unit_of_measurement: kWh
        device_class: energy
        state_class: total
        scale: 0.1
        scan_interval: 60

      - name: WR1 Battery voltage
        unique_id: wr1_battery_voltage
        slave: !secret sungrow_modbus_slave
        address: 13019 # reg 13020
        input_type: input
        data_type: uint16
        precision: 0
        unit_of_measurement: V
        device_class: voltage
        scale: 0.1
        scan_interval: 10

      - name: WR1 Battery current
        unique_id: wr1_battery_current
        slave: !secret sungrow_modbus_slave
        address: 13020 # reg 13021
        input_type: input
        data_type: uint16
        precision: 1
        unit_of_measurement: A
        state_class: measurement
        device_class: current
        scale: 0.1
        scan_interval: 10

      # always positive battery power
      # use binary_sensor.wr1_battery_charging | discharging to retrieve the direction of the energy flow
      - name: WR1 Battery power raw
        unique_id: wr1_battery_power_raw
        slave: !secret sungrow_modbus_slave
        address: 13021 # reg 13022
        input_type: input
        data_type: uint16
        precision: 0
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        scale: 1
        scan_interval: 10

      - name: WR1 Battery level
        unique_id: wr1_battery_level
        slave: !secret sungrow_modbus_slave
        address: 13022 # reg 13023
        input_type: input
        data_type: uint16
        precision: 1
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
        scale: 0.1
        scan_interval: 60

      - name: WR1 Battery state of health
        unique_id: wr1_battery_state_of_health
        slave: !secret sungrow_modbus_slave
        address: 13023 # reg 13024
        input_type: input
        data_type: uint16
        precision: 0
        unit_of_measurement: "%"
        state_class: measurement
        scale: 0.1
        scan_interval: 10

      - name: WR1 Battery temperature
        unique_id: wr1_battery_temperature
        slave: !secret sungrow_modbus_slave
        address: 13024 # reg 13025
        input_type: input
        data_type: int16
        precision: 1
        unit_of_measurement: °C
        device_class: temperature
        state_class: measurement
        scale: 0.1
        scan_interval: 60

      - name: WR1 Daily battery discharge
        unique_id: wr1_daily_battery_discharge
        slave: !secret sungrow_modbus_slave
        address: 13025 # reg 13026
        input_type: input
        data_type: uint16
        precision: 1
        unit_of_measurement: kWh
        device_class: energy
        state_class: total_increasing
        scale: 0.1
        scan_interval: 60

      - name: WR1 Total battery discharge
        unique_id: wr1_total_battery_discharge
        slave: !secret sungrow_modbus_slave
        address: 13026 # reg 13027
        input_type: input
        data_type: uint32
        swap: word
        precision: 1
        unit_of_measurement: kWh
        device_class: energy
        state_class: total
        scale: 0.1
        scan_interval: 10

      - name: WR1 Phase A current
        unique_id: wr1_phase_a_current
        slave: !secret sungrow_modbus_slave
        address: 13030 # reg 13031
        input_type: input
        data_type: int16
        precision: 1
        unit_of_measurement: A
        device_class: current
        state_class: measurement
        scale: 0.1
        scan_interval: 10

      - name: WR1 Phase B current
        unique_id: wr1_phase_b_current
        slave: !secret sungrow_modbus_slave
        address: 13031 # reg 13032
        input_type: input
        data_type: int16
        precision: 1
        unit_of_measurement: A
        device_class: current
        state_class: measurement
        scale: 0.1
        scan_interval: 10

      - name: WR1 Phase C current
        unique_id: wr1_phase_c_curren
        slave: !secret sungrow_modbus_slave
        address: 13032 # reg 13033
        input_type: input
        data_type: int16
        precision: 1
        unit_of_measurement: A
        device_class: current
        state_class: measurement
        scale: 0.1
        scan_interval: 10

      - name: WR1 Total active power
        unique_id: wr1_total_active_power
        slave: !secret sungrow_modbus_slave
        address: 13033 # reg 13034
        input_type: input
        data_type: int32
        swap: word
        precision: 0
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        scale: 1
        scan_interval: 10

      - name: WR1 Daily imported energy
        unique_id: wr1_daily_imported_energy
        slave: !secret sungrow_modbus_slave
        address: 13035 # reg 13036
        input_type: input
        data_type: uint16
        precision: 1
        unit_of_measurement: kWh
        device_class: energy
        state_class: total_increasing
        scale: 0.1
        scan_interval: 600

      - name: WR1 Total imported energy
        unique_id: wr1_total_imported_energy
        slave: !secret sungrow_modbus_slave
        address: 13036 # reg 13037
        input_type: input
        data_type: uint32
        swap: word
        precision: 1
        unit_of_measurement: kWh
        device_class: energy
        state_class: total
        scale: 0.1
        scan_interval: 600

      - name: WR1 Daily battery charge
        unique_id: wr1_daily_battery_charge
        slave: !secret sungrow_modbus_slave
        address: 13039 # reg 13040
        input_type: input
        data_type: uint16
        precision: 1
        unit_of_measurement: kWh
        device_class: energy
        state_class: total_increasing
        scale: 0.1
        scan_interval: 600

      - name: WR1 Total battery charge
        unique_id: wr1_total_battery_charge
        slave: !secret sungrow_modbus_slave
        address: 13040 # reg 13041
        input_type: input
        data_type: uint32
        swap: word
        precision: 1
        unit_of_measurement: kWh
        device_class: energy
        state_class: total
        scale: 0.1
        scan_interval: 600

      - name: WR1 Daily exported energy
        unique_id: wr1_daily_exported_energy
        slave: !secret sungrow_modbus_slave
        address: 13044 # reg 13045
        input_type: input
        data_type: uint16
        precision: 1
        unit_of_measurement: kWh
        device_class: energy
        state_class: total_increasing
        scale: 0.1
        scan_interval: 600

      - name: WR1 Total exported energy
        unique_id: wr1_total_exported_energy
        slave: !secret sungrow_modbus_slave
        address: 13045 # reg 13046
        input_type: input
        data_type: uint32
        swap: word
        precision: 1
        unit_of_measurement: kWh
        device_class: energy
        state_class: total
        scale: 0.1
        scan_interval: 600

      #####################
      # holding registers
      #####################
      - name: WR1 Inverter start stop
        unique_id: wr1_inverter_start_stop
        slave: !secret sungrow_modbus_slave
        address: 12999 # reg 13000
        input_type: holding
        data_type: uint16
        precision: 0
        scan_interval: 10

      - name: WR1 EMS mode selection raw
        unique_id: wr1_ems_mode_selection_raw
        slave: !secret sungrow_modbus_slave
        address: 13049 # reg 13050
        input_type: holding
        data_type: uint16
        scan_interval: 10

      - name: WR1 Battery forced charge discharge cmd raw
        unique_id: wr1_battery_forced_charge_discharge_cmd_raw
        slave: !secret sungrow_modbus_slave
        address: 13050 # reg 13051
        input_type: holding
        data_type: uint16
        precision: 0
        scan_interval: 10

      - name: WR1 Battery forced charge discharge power
        unique_id: wr1_battery_forced_charge_discharge_power
        slave: !secret sungrow_modbus_slave
        address: 13051 # reg 13052
        input_type: holding
        data_type: uint16
        precision: 0
        # datasheet says:
        # 0 to 5000 W for SH*K-*
        # 0 to 100 % for SH*.0RT
        # for my SH10RT it is set in Watt, not in %
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        scan_interval: 10

      - name: WR1 Max SoC
        unique_id: wr1_max_soc
        slave: !secret sungrow_modbus_slave
        address: 13057 # reg 13058
        input_type: holding
        data_type: uint16
        precision: 1
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
        scale: 0.1
        scan_interval: 10

      - name: WR1 Min SoC
        unique_id: wr1_min_soc
        slave: !secret sungrow_modbus_slave
        address: 13058 # reg 13059
        input_type: holding
        data_type: uint16
        precision: 1
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
        scale: 0.1
        scan_interval: 10

      - name: Export power limit
        unique_id: wr1_export_power_limit
        device_address: !secret sungrow_modbus_slave
        address: 13073 # reg 13074
        input_type: holding
        data_type: uint16
        precision: 0
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        scale: 1
        scan_interval: 10

      - name: Export power limit mode raw
        unique_id: wr1_export_power_limit_mode_raw
        device_address: !secret sungrow_modbus_slave
        address: 13086 # reg 13087
        input_type: holding
        data_type: uint16
        precision: 0
        state_class: measurement
        scan_interval: 10

      - name: WR1 Reserved SoC for backup
        unique_id: wr1_reserved_soc_for_backup
        slave: !secret sungrow_modbus_slave
        address: 13099 # reg 13100
        input_type: holding
        data_type: uint16
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
        scale: 1
        scan_interval: 10

      #undocumented sensors (reverse engineered by some guys of photovoltaikforum.com and forum.iobroker.net )
      - name: WR1 Battery max charge power
        unique_id: wr1_battery_max_charge_power
        slave: !secret sungrow_modbus_slave
        address: 33046 # reg 33047
        input_type: holding
        data_type: uint16
        precision: 0
        unit_of_measurement: W
        device_class: power
