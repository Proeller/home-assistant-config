<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 100 50"
  width="100"
  height="50"
  aria-hidden="true"
>

  <!-- Halbkreis mit Tagesverlauf -->
  <defs>
    <linearGradient id="dayGradient" x1="0" y1="1" x2="0" y2="0">
      <!-- Nacht -->
      <stop offset="0%" stop-color="#580000"/>
      <!-- Morgen -->
      <stop offset="35%" stop-color="#5e63ff"/>
      <!-- Mittag -->
      <stop offset="65%" stop-color="#ffdfad"/>
      <!-- Abend -->
      <stop offset="100%" stop-color="#c8651c"/>
    </linearGradient>
  </defs>

  <!-- Halbkreis -->
  <path
    d="M10,50
       A40,40 0 0 1 90,50
       Z"
    fill="url(#dayGradient)"
  />

  <!-- Sonnenkreis -->
  <circle
    cx="50"
    cy="32"
    r="7"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
  />

  <!-- Sonnenstrahlen -->
  <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <line x1="50" y1="18" x2="50" y2="14"/>
    <line x1="50" y1="46" x2="50" y2="42"/>
    <line x1="36" y1="32" x2="32" y2="32"/>
    <line x1="64" y1="32" x2="68" y2="32"/>
  </g>

</svg>
