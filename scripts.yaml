set_lights:
  fields:
    light_entities:
      description: The light entities to deal with
    xy_color:
      description: The desired color in CIE xy values
    color_temp_kelvin:
      description: The desired color temperature in Kelvin
    brightness:
      description: The desired brightness
    onoff_value:
      description: The desired state of onoff_lights (true/false)
    transition:
      description: The desired transition time in seconds
  variables:
    kelvin: '{{ ([color_temp_kelvin, 2000] | max) }}'
    color_lights: '{{ expand(light_entities)  | selectattr(''attributes.supported_color_modes'',
      ''contains'', ''xy'')  | map(attribute=''entity_id'')  | list }}

      '
    kelvin_lights: '{{ expand(light_entities)  | selectattr(''attributes.supported_color_modes'',
      ''contains'', ''color_temp'')  | map(attribute=''entity_id'')  | reject(''in'',
      color_lights)  | list }}

      '
    bright_lights: '{{ expand(light_entities)  | selectattr(''attributes.supported_color_modes'',
      ''contains'', ''brightness'')  | map(attribute=''entity_id'')  | reject(''in'',
      [color_lights, kelvin_lights])  | list }}

      '
    onoff_lights: '{{ expand(light_entities)  | selectattr(''attributes.supported_color_modes'',
      ''contains'', ''onoff'')  | map(attribute=''entity_id'')  | reject(''in'', [color_lights,
      kelvin_lights, bright_lights])  | list }}

      '
  sequence:
  - action: light.turn_on
    target:
      entity_id: '{{ color_lights }}'
    data:
      xy_color: '{{ xy_color }}'
      brightness: '{{ brightness }}'
      transition: '{{ transition }}'
  - action: light.turn_on
    target:
      entity_id: '{{ kelvin_lights }}'
    data:
      color_temp_kelvin: '{{ kelvin }}'
      brightness: '{{ brightness }}'
      transition: '{{ transition }}'
  - action: light.turn_on
    target:
      entity_id: '{{ bright_lights }}'
    data:
      brightness: '{{ brightness }}'
      transition: '{{ transition }}'
  - sequence:
    - if:
      - condition: template
        value_template: '{{ onoff_value }}'
      then:
      - action: light.turn_on
        target:
          entity_id: '{{ onoff_lights }}'
      else:
      - action: light.turn_off
        target:
          entity_id: '{{ onoff_lights }}'
  alias: Set_Lights
  description: Sets all lights according to their type
  mode: restart
  trace:
    stored_traces: 20
