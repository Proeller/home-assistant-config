# =============================================================================
# Zehnder ComfoAir Q - M5Stack AtomS3 Lite mit Mini CAN Unit
# =============================================================================
# Hardware: M5Stack AtomS3 Lite (8MB Flash) + M5Stack Mini CAN Unit (TJA1051T/3)
# Netzwerk: VLAN 30 (IoT), DHCP-Reservierung 10.10.30.45
# DNS:      esp32-comfoair.internal (lokal in UDM-SE eingetragen)
# Repo:     https://github.com/yoziru/esphome-zehnder-comfoair
# =============================================================================

substitutions:
  # Geräte-Identität
  name: esp32-comfoair
  friendly_name: "Zehnder ComfoAir Q"

  # AtomS3 Lite hat 8 MB Flash
  flash_size: 8MB

  # Secrets aus /config/esphome/secrets.yaml
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  wifi_hotspot_password: !secret wifi_hotspot_password
  ota_password: !secret ota_password
  api_encryption_key: !secret api_encryption_key

# -----------------------------------------------------------------------------
# Komplette ComfoAir-Q-Logik wird aus dem yoziru-Repo gezogen.
# Damit bleiben Updates trivial: einfach @main auf einen Tag pinnen,
# z.B. @v2025.8.19 für reproduzierbare Builds.
# -----------------------------------------------------------------------------
packages:
  remote_package: github://yoziru/esphome-zehnder-comfoair/zehnder-comfoair-q-m5stack-atoms3.dashboard.yml@main

# -----------------------------------------------------------------------------
# WLAN-Override:
# - use_address sorgt dafuer, dass das ESPHome-Dashboard das Geraet
#   ueber den lokalen DNS-Eintrag findet (unabhaengig von mDNS).
# - DHCP-Reservierung in der UDM-SE auf 10.10.30.45 ist aktiv,
#   daher kein manual_ip noetig.
# -----------------------------------------------------------------------------
wifi:
  use_address: esp32-comfoair.internal
