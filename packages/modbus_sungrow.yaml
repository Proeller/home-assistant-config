        scale: 10
        scan_interval: 10

      - name: WR1 Battery max discharge power
        unique_id: wr1_battery_max_discharge_power
        slave: !secret sungrow_modbus_slave
        address: 33047 # reg 33048
        input_type: holding
        data_type: uint16
        precision: 0
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        scale: 10
        scan_interval: 10

      - name: WR1 Battery charging start power
        unique_id: wr1_battery_charging_start_power
        slave: !secret sungrow_modbus_slave
        address: 33148 # reg 33149
        input_type: holding
        data_type: uint16
        precision: 0
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        scale: 10
        scan_interval: 10

      - name: WR1 Battery discharging start power
        unique_id: wr1_battery_discharging_start_power
        slave: !secret sungrow_modbus_slave
        address: 33149 # reg 33150
        input_type: holding
